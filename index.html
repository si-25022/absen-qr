<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Absensi QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; }
    #result { margin-top: 20px; padding: 15px; font-weight: bold; border-radius: 8px; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Scanner Absensi Mentor</h2>
    <div id="reader"></div>
    <div id="result"></div>
  </div>

<script>
  // GANTI tulisan di bawah dengan URL Aplikasi Web dari Langkah 2
  const scriptURL = 'https://script.google.com/macros/s/GANTI_DENGAN_ID_ANDA/exec'; 
  
  let isScanning = true;

  function onScanSuccess(decodedText, decodedResult) {
    if (!isScanning) return;
    isScanning = false;
    
    let resultDiv = document.getElementById('result');
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "Memproses ID: " + decodedText + "...";

    // Siapkan data untuk dikirim
    let formData = new URLSearchParams();
    formData.append('idPeserta', decodedText);

    // Kirim data ke Google Apps Script menggunakan Fetch API
    fetch(scriptURL, { 
      method: 'POST', 
      body: formData 
    })
    .then(response => response.json())
    .then(data => {
      if(data.status === 'success') {
        resultDiv.innerHTML = "<span class='success'>" + data.message + "</span>";
      } else {
        resultDiv.innerHTML = "<span style='color:red;'>Error sistem.</span>";
      }
      
      // Jeda 3 detik sebelum bisa scan lagi
      setTimeout(() => { 
        isScanning = true; 
        resultDiv.style.display = "none";
      }, 3000);
    })
    .catch(error => {
      console.error('Error!', error.message);
      resultDiv.innerHTML = "<span style='color:red;'>Gagal terhubung ke Google Sheets.</span>";
      setTimeout(() => { isScanning = true; }, 3000);
    });
  }

  function onScanFailure(error) {
    // Abaikan error saat mencari QR
  }

  let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: {width: 250, height: 250} },
    false);
  html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>
</body>
</html>
