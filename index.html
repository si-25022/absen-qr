<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Absensi QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
    .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #reader { width: 100%; border-radius: 8px; overflow: hidden; }
    #result { margin-top: 20px; padding: 15px; font-weight: bold; border-radius: 8px; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; }
    .error { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Scanner Absensi Mentor</h2>
    <div id="reader"></div>
    <div id="result"></div>
  </div>

  <script>
    // ⚠️ GANTI DENGAN URL WEB APP ANDA YANG BARU DARI GOOGLE SCRIPT
    const WEB_APP_URL = "PASTE_URL_WEB_APP_ANDA_DISINI";

    let isScanning = true;

    function onScanSuccess(decodedText, decodedResult) {
      if (!isScanning) return;
      isScanning = false;
      
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = "block";
      resultDiv.className = "";
      resultDiv.innerHTML = "Memproses ID: " + decodedText + "...";

      // Mengirim data hasil scan ke Google Spreadsheet
      fetch(`${WEB_APP_URL}?id=${encodeURIComponent(decodedText)}`)
        .then(response => response.json())
        .then(data => {
          if(data.status === "success") {
            resultDiv.className = "success";
          } else {
            resultDiv.className = "error";
          }
          resultDiv.innerHTML = data.message;
          
          // Jeda 3 detik sebelum bisa scan lagi
          setTimeout(() => { 
            isScanning = true; 
            resultDiv.style.display = "none";
          }, 3000);
        })
        .catch(err => {
          resultDiv.className = "error";
          resultDiv.innerHTML = "Gagal terhubung ke Google Sheets.";
          setTimeout(() => { isScanning = true; }, 3000);
        });
    }

    function onScanFailure(error) {
      // Abaikan log error scan biasa
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
  </script>
</body>
</html>
